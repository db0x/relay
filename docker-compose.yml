services:
  documentserver:
    build: ./documentserver            # bringt local.json als echte Datei ins Image
    restart: unless-stopped
    environment:
      # JWT an: schuetzt die Kommunikation Backend<->DocumentServer vor Manipulation
      - JWT_ENABLED=true
      - JWT_SECRET=${JWT_SECRET}
      - JWT_HEADER=Authorization
      # gemeinsames Cache-Secret fuer nginx (ds.conf) und DocService (storage.fs)
      - SECURE_LINK_SECRET=${SECURE_LINK_SECRET}
    volumes:
      # Persistenz ueber Neustarts (DB, Cache, Lizenz/Daten)
      - ds_data:/var/www/onlyoffice/Data
      - ds_lib:/var/lib/onlyoffice
      - ds_db:/var/lib/postgresql
    # im LAN erreichbar: Browser laedt api.js/Editor direkt von hier;
    # ohne gueltiges JWT bzw. signierten Link gibt der Server nichts heraus
    ports: ["${DS_PORT}:80"]

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - PUBLIC_DS_URL=http://${SERVER_HOST}:${DS_PORT}  # Browser -> DocumentServer
      - HOST_INTERNAL=http://backend:5000               # DocumentServer -> uns
      - DS_INTERNAL=http://documentserver               # uns -> DocumentServer (Cache)
      - JWT_SECRET=${JWT_SECRET}                        # OnlyOffice-Config/Callback signieren
      - FILE_SECRET=${FILE_SECRET}                      # signierte /files-Links
      - SESSION_SECRET=${SESSION_SECRET}                # signiert Login-Session-Cookies
      - INSTANCE_NAME=${INSTANCE_NAME:-Relay}           # Anzeigename der Instanz in der UI
    volumes:
      - ./documents:/data/documents
      - ./state:/data/state                             # Nutzerdatenbank (users.db)
    # im LAN erreichbar; Browser-Routen sind per Login geschuetzt
    ports: ["${UI_PORT}:5000"]
    depends_on: [documentserver]

volumes:
  ds_data:
  ds_lib:
  ds_db:
